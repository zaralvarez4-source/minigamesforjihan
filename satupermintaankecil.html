<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Permintaan Kecil</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Fredoka:wght@500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#87CEEB,#FFD6E7,#D8F8C8);
}

.card{
width:900px;
background:white;
padding:50px;
border-radius:30px;
text-align:center;
box-shadow:0 20px 40px rgba(0,0,0,.15);
animation:fade 0.8s;
}

@keyframes fade{
from{opacity:0;transform:scale(.9);}
to{opacity:1;transform:scale(1);}
}

h1{
font-family:Fredoka;
font-size:50px;
color:#ff69b4;
}

.icon{
font-size:80px;
margin:20px 0;
animation:float 2s infinite;
}

@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0);}
}

p{
font-size:22px;
color:#555;
line-height:38px;
margin-top:20px;
min-height:200px;
}

button{
margin-top:30px;
padding:16px 40px;
border:none;
border-radius:40px;
background:#ff69b4;
color:white;
font-size:18px;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.05);
}

#lanjut{
display:none;
}

</style>

</head>

<body>

<div class="card">

<h1>💌 Permintaan Kecil</h1>

<div class="icon">🌸</div>

<p id="text">
Sebelum semuanya selesai...
aku punya satu hal kecil.
</p>

<button id="btn" onclick="buka()">
Buka ✨
</button>

<button id="lanjut" onclick="location.href='call.html'">
📞 Lanjut
</button>

</div>

<script>

function buka(){

document.getElementById("text").innerHTML=

"Terima kasih ya Jihan... 🌸<br><br>"+

"Udah mau nemenin sampai sejauh ini di petualangan kecil ini.<br><br>"+

"Mungkin ini cuma website sederhana...<br>"+
"tapi aku bikin ini dengan niat yang baik 😊<br><br>"+

"Sekarang tinggal satu langkah terakhir...<br><br>"+

"Kalau kamu lagi sempat...<br><br>"+

"<b>Boleh nggak kita call 10–15 menit aja?</b> 🤍";

document.getElementById("btn").style.display="none";
document.getElementById("lanjut").style.display="inline-block";

}

</script>

</body>
</html>
