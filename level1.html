<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Level 1</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

overflow:hidden;

background:linear-gradient(135deg,#FFD8EA,#FFF2F7,#DDF8D8,#B7E8A5);

}

/* Background */

.cloud{

position:absolute;

font-size:55px;

opacity:.5;

animation:jalan 18s linear infinite;

}

.c1{top:10%;left:-100px;}
.c2{bottom:15%;left:-250px;animation-delay:7s;}

.star{

position:absolute;

font-size:22px;

animation:blink 2s infinite;

}

.s1{top:12%;left:20%;}
.s2{top:18%;right:18%;}
.s3{bottom:18%;left:15%;}
.s4{bottom:15%;right:15%;}

.card{

width:900px;

background:rgba(255,255,255,.95);

padding:45px;

border-radius:35px;

text-align:center;

box-shadow:0 20px 40px rgba(0,0,0,.15);

animation:fade .8s;

}

.progress{

width:100%;

height:12px;

background:#eee;

border-radius:20px;

overflow:hidden;

margin-bottom:30px;

}

.bar{

width:20%;

height:100%;

background:linear-gradient(90deg,#FF8FB8,#8FD36A);

}

h1{

font-family:'Fredoka',sans-serif;

font-size:50px;

color:#FF6FAE;

}

p{

margin-top:15px;

font-size:18px;

color:#666;

line-height:30px;

}

.doors{

display:flex;

justify-content:center;

gap:35px;

margin-top:45px;

flex-wrap:wrap;

}

.door{

width:180px;

height:250px;

border-radius:20px;

cursor:pointer;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

font-size:65px;

color:white;

transition:.3s;

box-shadow:0 10px 20px rgba(0,0,0,.15);

}

.door:hover{

transform:translateY(-10px) scale(1.05);

}

.pink{

background:#FF92C2;

}

.matcha{

background:#8BCB70;

}

.sky{

background:#87CEFA;

}

.door span{

margin-top:15px;

font-size:22px;

font-weight:bold;

}

#hasil{

margin-top:30px;

font-size:22px;

font-weight:bold;

min-height:40px;

}

button{

display:none;

margin-top:20px;

padding:15px 35px;

font-size:18px;

border:none;

border-radius:40px;

background:linear-gradient(90deg,#FF8FB8,#8FD36A);

color:white;

cursor:pointer;

font-weight:bold;

}

button:hover{

transform:scale(1.05);

}

@keyframes blink{

50%{

opacity:.2;

}

}

@keyframes jalan{

from{

transform:translateX(0);

}

to{

transform:translateX(1700px);

}

}

@keyframes fade{

from{

opacity:0;

transform:translateY(30px);

}

to{

opacity:1;

transform:translateY(0);

}

}

</style>

</head>

<body>

<div class="cloud c1">☁️</div>
<div class="cloud c2">☁️</div>

<div class="star s1">✨</div>
<div class="star s2">🌸</div>
<div class="star s3">🍵</div>
<div class="star s4">💗</div>

<div class="card">

<div class="progress">
<div class="bar"></div>
</div>

<h1>🌸 LEVEL 1</h1>

<p>

Selamat datang di petualangan pertama!

Jihan harus memilih pintu yang paling menggambarkan dirinya.

Petunjuk kecil...

Seseorang di sini suka minum sesuatu yang berwarna hijau. 🍵

</p>

<div class="doors">

<div class="door pink" onclick="salah()">

💗

<span>Pink Door</span>

</div>

<div class="door matcha" onclick="benar()">

🍵

<span>Matcha Door</span>

</div>

<div class="door sky" onclick="salah()">

☁️

<span>Sky Door</span>

</div>

</div>

<div id="hasil"></div>

<button id="next" onclick="location.href='level2.html'">

Lanjut ke Level 2 ➜

</button>

</div>

<script>

function benar(){

document.getElementById("hasil").innerHTML="🎉 Yeayy! Kamu memilih pintu yang tepat. Matcha memang identik sama Jihan. 💚";

document.getElementById("hasil").style.color="#5A9E3A";

document.getElementById("next").style.display="inline-block";

}

function salah(){

document.getElementById("hasil").innerHTML="🤭 Hehe... sepertinya bukan pintu itu. Coba pilih lagi ya!";

document.getElementById("hasil").style.color="#FF5C8A";

}

</script>

</body>
</html>
