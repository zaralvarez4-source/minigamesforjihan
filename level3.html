<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Level 3</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700&family=Poppins:wght@400;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:linear-gradient(135deg,#87CEEB,#FFD6E7,#D8F8C8);

overflow:hidden;

}

.card{

width:850px;

background:white;

padding:40px;

border-radius:30px;

box-shadow:0 15px 35px rgba(0,0,0,.2);

text-align:center;

}

.progress{

width:100%;

height:12px;

background:#eee;

border-radius:20px;

overflow:hidden;

margin-bottom:25px;

}

.bar{

width:100%;

height:100%;

background:linear-gradient(90deg,#FF8FB8,#8FD36A);

}

h1{

font-family:'Fredoka',sans-serif;

font-size:45px;

color:#FF69B4;

}

#nomor{

margin-top:20px;

font-size:22px;

font-weight:bold;

color:#72B255;

}

#pertanyaan{

margin-top:20px;

font-size:24px;

line-height:35px;

color:#555;

}

.pilihan{

display:grid;

grid-template-columns:repeat(2,1fr);

gap:18px;

margin-top:35px;

}

button{

padding:18px;

border:none;

border-radius:18px;

background:#FFE8F2;

font-size:18px;

cursor:pointer;

transition:.3s;

}

button:hover{

background:#FFD0E6;

transform:scale(1.05);

}

#hasil{

margin-top:30px;

font-size:22px;

font-weight:bold;

min-height:40px;

}

#next{

display:none;

margin-top:25px;

background:#FF69B4;

color:white;

padding:15px 35px;

border-radius:40px;

}

</style>

</head>

<body>

<div class="card">

<div class="progress">

<div class="bar"></div>

</div>

<h1>💗 LEVEL 3 💗</h1>

<div id="nomor"></div>

<div id="pertanyaan"></div>

<div class="pilihan" id="pilihan"></div>

<div id="hasil"></div>

<button id="next" onclick="location.href='winner.html'">

🎁 Ambil Hadiah

</button>

</div>

<script>

const soal=[

{

q:"🍵 Apa minuman favoritku?",

a:["Kopi","Matcha","Jus","Soda"],

b:1

},

{

q:"💻 Aku paling suka ngapain?",

a:["Main Bola","Ngoding","Memancing","Tidur"],

b:1

},

{

q:"👩 Siapa orang yang sedang memainkan game ini?",

a:["Buzz","Woody","Jihan","Barbie"],

b:2

}

];

let index=0;

let benar=0;

tampil();

function tampil(){

document.getElementById("nomor").innerHTML="Pertanyaan "+(index+1)+" dari "+soal.length;

document.getElementById("pertanyaan").innerHTML=soal[index].q;

let html="";

for(let i=0;i<4;i++){

html+=`<button onclick="jawab(${i})">${soal[index].a[i]}</button>`;

}

document.getElementById("pilihan").innerHTML=html;

}

function jawab(x){

if(x==soal[index].b){

benar++;

document.getElementById("hasil").innerHTML="💚 Benar!";

document.getElementById("hasil").style.color="green";

}else{

document.getElementById("hasil").innerHTML="🤭 Belum tepat, tapi tetap lanjut ya!";

document.getElementById("hasil").style.color="crimson";

}

setTimeout(function(){

index++;

document.getElementById("hasil").innerHTML="";

if(index<soal.length){

tampil();

}else{

document.getElementById("pertanyaan").innerHTML=

"🎉 Wahhh! Kamu berhasil menyelesaikan semua tantangan.<br><br>Kamu menjawab <b>"+benar+"</b> dari <b>"+soal.length+"</b> pertanyaan dengan benar. 🥹💗";

document.getElementById("pilihan").style.display="none";

document.getElementById("nomor").style.display="none";

document.getElementById("next").style.display="inline-block";

}

},1000);

}

</script>

</body>
</html>
